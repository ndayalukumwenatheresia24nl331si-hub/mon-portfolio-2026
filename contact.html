    <main class="contact-container">
        <section class="contact-info">
            <h1>Contactez-moi</h1>
            <p>Basée à <strong>Lubumbashi</strong>, je suis disponible pour vos projets.</p>
            
            <div class="direct-contact">
                <div class="contact-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+243 992 293 851</span>
                </div>
                <div class="social-links-contact">
                    <a href="https://wa.me" target="_blank" title="WhatsApp">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://t.me" target="_blank" title="Telegram">
                        <i class="fa-brands fa-telegram"></i> Telegram
                    </a>
                </div>
            </div>
        </section>

        <section class="contact-form">
            <form action="#">
                <div class="form-group">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="tel">Téléphone</label>
                    <input type="tel" id="tel" name="tel" placeholder="+243..." required>
                </div>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </section>
    </main>
